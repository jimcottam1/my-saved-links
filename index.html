<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Saved Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;
    --border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.2);
    --text:#f0ede8;--muted:#666;--accent:#e8b86d;--accent-dim:rgba(232,184,109,0.10);
    --fb:#1877f2;--ig-a:#f09433;--ig-b:#e6683c;--ig-c:#dc2743;--ig-d:#cc2366;--ig-e:#bc1888;
    --radius:14px;--sidebar-w:236px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}

  /* SIDEBAR */
  #sidebar{width:var(--sidebar-w);height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
  #sidebar-header{padding:26px 20px 14px;border-bottom:1px solid var(--border);}
  #sidebar-header h1{font-family:"DM Serif Display",serif;font-size:19px;font-weight:400;color:var(--accent);margin-bottom:3px;}
  #sidebar-header p{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
  .s-sec{padding:14px 18px 6px;}
  .s-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;}
  .plat-btns{display:flex;gap:5px;flex-wrap:wrap;}
  .plat-btn{font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .14s;}
  .plat-btn:hover{border-color:var(--border-hover);color:var(--text);}
  .plat-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
  .plat-btn.fb.active{background:var(--fb);color:#fff;border-color:var(--fb);}
  .plat-btn.ig.active{background:var(--ig-c);color:#fff;border-color:var(--ig-c);}
  .dead-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--muted);margin-top:4px;}
  .dead-toggle input{cursor:pointer;accent-color:var(--accent);}
  .dead-toggle:hover{color:var(--text);}
  .cat-list{list-style:none;padding-bottom:20px;}
  .cat-item{display:flex;align-items:center;padding:6px 10px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .11s;margin-bottom:1px;border:1px solid transparent;}
  .cat-item:hover{background:var(--surface2);color:var(--text);}
  .cat-item.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(232,184,109,.18);}
  .cat-dot{width:7px;height:7px;border-radius:50%;margin-right:8px;flex-shrink:0;}
  .cat-name{flex:1;}
  .cat-count{font-size:10px;color:var(--muted);background:rgba(255,255,255,.05);padding:1px 6px;border-radius:10px;}
  .cat-item.active .cat-count{color:var(--accent);background:rgba(232,184,109,.12);}

  /* MAIN */
  #main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden;}
  #topbar{background:rgba(15,15,15,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:13px 22px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
  #search-wrap{flex:1;position:relative;}
  #si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}
  #search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:"DM Sans",sans-serif;font-size:14px;padding:8px 13px 8px 34px;outline:none;transition:border-color .14s;}
  #search::placeholder{color:var(--muted);}
  #search:focus{border-color:var(--accent);}
  #rc{font-size:12px;color:var(--muted);white-space:nowrap;}
  #sort{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:"DM Sans",sans-serif;font-size:12px;padding:7px 11px;outline:none;cursor:pointer;}

  /* GRID */
  #grid-wrap{flex:1;overflow-y:auto;padding:20px 22px;}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;align-items:start;}

  /* CARD */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .14s;}
  .card:not(.dead):hover{border-color:var(--border-hover);}
  .card.previewing{border-color:rgba(232,184,109,.35);grid-column:span 2;}
  .card.dead{opacity:.38;}

  .card-meta{padding:12px 13px 0;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .bdg{font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;white-space:nowrap;}
  .bdg-plat{background:transparent;border:1px solid;}
  .bdg-plat.fb{color:var(--fb);border-color:rgba(24,119,242,.35);}
  .bdg-plat.ig{color:var(--ig-c);border-color:rgba(220,39,67,.35);}
  .card-num{font-size:10px;color:var(--muted);}
  .card-body{padding:8px 13px 10px;}
  .card-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;}
  .card-desc{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-footer{padding:8px 13px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .cat-bdg{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;flex-shrink:0;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .card-acts{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .btn-prev{font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .13s;display:flex;align-items:center;gap:4px;}
  .btn-prev:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
  .btn-prev.on{background:var(--accent);color:#000;border-color:var(--accent);}
  .btn-ext{font-size:13px;width:28px;height:28px;border-radius:7px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;transition:all .13s;flex-shrink:0;}
  .btn-ext:hover{border-color:var(--border-hover);color:var(--text);}
  .dead-tag{font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.04);color:#444;border:1px solid rgba(255,255,255,.06);}

  /* PREVIEW ZONE */
  .prev-zone{display:none;border-top:1px solid var(--border);}
  .prev-zone.on{display:block;}

  /* ─── PROMO CARD (shared base) ─── */
  .promo-card{
    position:relative;
    height:240px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:16px;
    padding:28px 20px;
  }

  /* animated scan lines overlay */
  .promo-card::after{
    content:"";
    position:absolute;inset:0;
    background:repeating-linear-gradient(
      0deg,
      transparent,transparent 3px,
      rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px
    );
    pointer-events:none;
    z-index:1;
  }

  /* ─── FACEBOOK promo ─── */
  .promo-fb{background:#050d1a;}
  .promo-fb .promo-bg{
    position:absolute;inset:0;
    background:radial-gradient(ellipse 120% 100% at 30% 40%, rgba(24,119,242,0.45) 0%, transparent 60%),
               radial-gradient(ellipse 80% 80% at 75% 70%, rgba(10,60,140,0.6) 0%, transparent 55%);
    animation:fbglow 4s ease-in-out infinite alternate;
  }
  @keyframes fbglow{
    from{opacity:.7;}
    to{opacity:1;}
  }
  /* reel film strip lines */
  .promo-fb .film-strip{
    position:absolute;top:0;bottom:0;left:14px;width:18px;
    display:flex;flex-direction:column;gap:6px;padding:8px 0;opacity:.18;
    animation:filmscroll 2s linear infinite;
  }
  .promo-fb .film-strip::after{
    content:"";position:absolute;top:0;bottom:0;right:14px;width:18px;
    display:flex;flex-direction:column;gap:6px;padding:8px 0;
  }
  @keyframes filmscroll{to{transform:translateY(-50%);}}
  .film-hole{width:10px;height:10px;border-radius:2px;background:#fff;flex-shrink:0;margin:0 auto;}

  /* ─── INSTAGRAM promo ─── */
  .promo-ig{background:#0d0010;}
  .promo-ig .promo-bg{
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse 100% 80% at 20% 50%, rgba(240,148,51,.35) 0%, transparent 50%),
      radial-gradient(ellipse 80% 100% at 80% 30%, rgba(188,24,136,.5) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 50% 80%, rgba(220,39,67,.3) 0%, transparent 50%);
    animation:igglow 3.5s ease-in-out infinite alternate;
  }
  @keyframes igglow{
    from{opacity:.65;transform:scale(1);}
    to{opacity:1;transform:scale(1.05);}
  }

  /* ─── SHARED promo elements ─── */
  .promo-logo{
    position:relative;z-index:2;
    width:52px;height:52px;border-radius:13px;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;font-weight:700;
    box-shadow:0 4px 24px rgba(0,0,0,0.5);
    flex-shrink:0;
  }
  .promo-fb .promo-logo{background:#1877f2;color:#fff;}
  .promo-ig .promo-logo{
    background:linear-gradient(135deg,var(--ig-a),var(--ig-b),var(--ig-c),var(--ig-d),var(--ig-e));
    color:#fff;
  }

  .promo-text{position:relative;z-index:2;text-align:center;}
  .promo-text h3{font-family:"DM Serif Display",serif;font-size:16px;font-weight:400;color:#fff;margin-bottom:4px;line-height:1.3;}
  .promo-text p{font-size:11px;color:rgba(255,255,255,.45);}

  .promo-watch-btn{
    position:relative;z-index:2;
    display:inline-flex;align-items:center;gap:8px;
    font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;
    padding:10px 24px;border-radius:24px;
    text-decoration:none;border:none;cursor:pointer;
    transition:transform .15s, box-shadow .15s;
    white-space:nowrap;
  }
  .promo-watch-btn:hover{transform:scale(1.04);box-shadow:0 6px 24px rgba(0,0,0,0.4);}
  .promo-watch-btn:active{transform:scale(.97);}
  .promo-fb .promo-watch-btn{background:#1877f2;color:#fff;box-shadow:0 4px 16px rgba(24,119,242,.4);}
  .promo-ig .promo-watch-btn{
    background:linear-gradient(90deg,var(--ig-a),var(--ig-c),var(--ig-e));
    color:#fff;
    box-shadow:0 4px 16px rgba(188,24,136,.4);
  }

  /* play icon animation */
  .play-icon{
    width:18px;height:18px;flex-shrink:0;
    animation:playpulse 1.8s ease-in-out infinite;
  }
  @keyframes playpulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.2);}
  }

  /* floating reel icon */
  .reel-icon{
    position:absolute;right:18px;top:50%;transform:translateY(-50%);
    font-size:56px;opacity:.06;z-index:1;
    animation:reelspin 8s linear infinite;
  }
  @keyframes reelspin{to{transform:translateY(-50%) rotate(360deg);}}

  #empty{display:none;text-align:center;padding:80px 20px;color:var(--muted);grid-column:1/-1;}
  #empty h3{font-family:"DM Serif Display",serif;font-size:22px;font-weight:400;margin-bottom:8px;color:var(--text);}
  @media(max-width:700px){#sidebar{display:none;}.card.previewing{grid-column:span 1;}}
</style>
</head>

  <div class="s-sec" style="padding-bottom:0">

  </div>
</div>

const CC={
  "Food / recipes":        {bg:"rgba(50,102,173,.15)",  t:"#6ba3e8"},
  "Funny / humour":        {bg:"rgba(216,90,48,.15)",   t:"#e8906a"},
  "Health / wellness":     {bg:"rgba(29,158,117,.15)",  t:"#5ecfab"},
  "Animals / pets":        {bg:"rgba(193,53,132,.15)",  t:"#df7bbd"},
  "Sport":                 {bg:"rgba(29,158,117,.15)",  t:"#5ecfab"},
  "Sport / cycling":       {bg:"rgba(29,158,117,.13)",  t:"#4dc9a0"},
  "Music / entertainment": {bg:"rgba(186,117,23,.15)",  t:"#e8a84d"},
  "Local / Limerick":      {bg:"rgba(127,119,221,.15)", t:"#a8a0ee"},
  "Local / Ireland":       {bg:"rgba(127,119,221,.12)", t:"#9890e8"},
  "News / current affairs":{bg:"rgba(216,90,48,.12)",   t:"#d87060"},
  "News / weather":        {bg:"rgba(50,102,173,.12)",  t:"#5a9de8"},
  "Inspirational":         {bg:"rgba(232,184,109,.15)", t:"#e8b86d"},
  "Family / kids":         {bg:"rgba(193,53,132,.12)",  t:"#d87bbf"},
  "Travel":                {bg:"rgba(50,102,173,.13)",  t:"#7aace8"},
  "Travel / Ireland":      {bg:"rgba(50,102,173,.12)",  t:"#6ba3e8"},
  "Shopping / deals":      {bg:"rgba(186,117,23,.12)",  t:"#d4a040"},
  "Finance / pensions":    {bg:"rgba(29,158,117,.12)",  t:"#4dc4a0"},
  "Dead link":             {bg:"rgba(80,80,80,.15)",    t:"#555"},
  "Uncategorised":         {bg:"rgba(80,80,80,.12)",    t:"#555"},
};
function cc(c){return CC[c]||{bg:"rgba(100,100,100,.12)",t:"#888"};}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function mkTitle(l){if(l.title&&l.title!=="Facebook"&&l.title!=="Instagram")return l.title;if(l.desc)return l.desc.substring(0,80)+(l.desc.length>80?"...":"");return "Untitled";}

let aC="all",aP="all",hD=true,sQ="",sB="id";

function buildCats(){
  const cn={};LINKS.forEach(l=>{cn[l.category]=(cn[l.category]||0)+1;});
  const ul=document.getElementById("cat-list");ul.innerHTML="";
  const all=document.createElement("li");all.className="cat-item active";all.dataset.cat="all";
  all.innerHTML=`<span class="cat-dot" style="background:#555;"></span><span class="cat-name">All</span><span class="cat-count">${LINKS.length}</span>`;
  all.onclick=()=>selCat("all");ul.appendChild(all);
  Object.entries(cn).sort((a,b)=>b[1]-a[1]).forEach(([cat,n])=>{
    if(cat==="Dead link")return;
    const c=cc(cat);const li=document.createElement("li");li.className="cat-item";li.dataset.cat=cat;
    li.innerHTML=`<span class="cat-dot" style="background:${c.t};opacity:.75;"></span><span class="cat-name">${cat}</span><span class="cat-count">${n}</span>`;
    li.onclick=()=>selCat(cat);ul.appendChild(li);
  });
}
function selCat(c){aC=c;document.querySelectorAll(".cat-item").forEach(el=>el.classList.toggle("active",el.dataset.cat===c));render();}

function filtered(){
  let L=LINKS.slice();
  if(hD)L=L.filter(l=>l.category!=="Dead link");
  if(aP!=="all")L=L.filter(l=>l.platform===aP);
  if(aC!=="all")L=L.filter(l=>l.category===aC);
  if(sQ){const q=sQ.toLowerCase();L=L.filter(l=>(l.title||"").toLowerCase().includes(q)||(l.desc||"").toLowerCase().includes(q)||(l.category||"").toLowerCase().includes(q));}
  if(sB==="cat")L.sort((a,b)=>a.category.localeCompare(b.category));
  else if(sB==="plat")L.sort((a,b)=>a.platform.localeCompare(b.platform));
  return L;
}

function makePromo(link, titleText){
  const isIG = link.platform === "Instagram";
  const cls  = isIG ? "promo-ig" : "promo-fb";
  const logo = isIG ? "&#128247;" : "f";
  const label = isIG ? "Watch Reel on Instagram" : "Watch Reel on Facebook";

  // Generate film holes for FB
  let filmHoles = "";
  if(!isIG){
    for(let i=0;i<20;i++) filmHoles += `<div class="film-hole"></div>`;
  }

  return `
    <div class="prev-zone on">
      <div class="promo-card ${cls}">
        <div class="promo-bg"></div>
        ${!isIG ? `<div class="film-strip">${filmHoles}</div>` : ""}
        <div class="reel-icon">&#127910;</div>
        <div class="promo-logo">${logo}</div>
        <div class="promo-text">
          <h3>${esc(titleText.substring(0,50))}</h3>
          <p>${link.category}</p>
        </div>
        <a class="promo-watch-btn" href="${esc(link.url)}" target="_blank" rel="noopener">
          <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          ${label}
        </a>
      </div>
    </div>`;
}

function togglePreview(link, card){
  const existing = card.querySelector(".prev-zone");
  const btn = card.querySelector(".btn-prev");

  if(existing){
    existing.remove();
    card.classList.remove("previewing");
    btn.classList.remove("on");
    btn.innerHTML = "&#9654; Preview";
    return;
  }

  card.classList.add("previewing");
  btn.classList.add("on");
  btn.innerHTML = "&#9650; Close";
  card.scrollIntoView({behavior:"smooth", block:"nearest"});

  const promo = makePromo(link, mkTitle(link));
  card.insertAdjacentHTML("beforeend", promo);
}

function render(){
  const list=filtered();
  const grid=document.getElementById("grid");
  const empty=document.getElementById("empty");
  document.getElementById("rc").textContent=`${list.length} link${list.length!==1?"s":""}`;
  grid.querySelectorAll(".card").forEach(el=>el.remove());
  if(list.length===0){empty.style.display="block";return;}
  empty.style.display="none";

  list.forEach(link=>{
    const c=cc(link.category);
    const dead=link.category==="Dead link";
    const pc=link.platform==="Facebook"?"fb":"ig";
    const t=mkTitle(link);
    const hasD=link.desc&&link.desc!==t;

    const card=document.createElement("div");
    card.className="card"+(dead?" dead":"");
    card.dataset.id=link.id;

    card.innerHTML=`
      <div class="card-meta">
        <span class="bdg bdg-plat ${pc}">${link.platform}</span>
        <span class="card-num">#${link.id}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${esc(t)}</div>
        ${hasD?`<div class="card-desc">${esc(link.desc)}</div>`:""}
      </div>
      <div class="card-footer">
        ${dead
          ?`<span class="dead-tag">Dead link</span><span style="font-size:11px;color:#3a3a3a;">Unavailable</span>`
          :`<span class="cat-bdg" style="background:${c.bg};color:${c.t};">${link.category}</span>
            <div class="card-acts">
              <button class="btn-prev">&#9654; Preview</button>
              <a class="btn-ext" href="${esc(link.url)}" target="_blank" rel="noopener" title="Open original">&#8599;</a>
            </div>`
        }
      </div>
    `;

    if(!dead){
      card.querySelector(".btn-prev").onclick=e=>{
        e.stopPropagation();
        togglePreview(link, card);
      };
    }

    grid.appendChild(card);
  });
}

document.querySelectorAll(".plat-btn").forEach(b=>{
  b.onclick=()=>{aP=b.dataset.plat;document.querySelectorAll(".plat-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");render();};
});
document.getElementById("hide-dead").onchange=function(){hD=this.checked;render();};
document.getElementById("search").oninput=function(){sQ=this.value.trim();render();};
document.getElementById("sort").onchange=function(){sB=this.value;render();};

buildCats();
render();
</script>
</body>
